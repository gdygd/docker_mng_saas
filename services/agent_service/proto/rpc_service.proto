syntax = "proto3";

package pb;



option go_package = "agent_service/pb";

import "rpc_message.proto";
import "server_message.proto";
import "test_message.proto";
import "container_message.proto";

service ContainerService{
    // client stream
    rpc ConnMessage(stream Hello) returns (stream Hello);
    rpc DataStream(stream AgentMessage) returns (stream ServerMessage);
    

    // unary
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
    rpc ContainerState(AgentMessage) returns (ServerMessage);

    rpc ContainerInfo(AgentMessage) returns (ServerMessage);
    rpc ContainerInspect(AgentMessage) returns (ServerMessage);
    rpc ContainerStats(AgentMessage) returns (ServerMessage);
    rpc ContainerEvent(AgentMessage) returns (ServerMessage);
}
